    <line x1="46" y1="6" x2="48" y2="4" stroke="#FFB300" stroke-width="1"/>
    <line x1="46" y1="12" x2="49" y2="12" stroke="#FFB300" stroke-width="1"/>
    <line x1="34" y1="6" x2="32" y2="4" stroke="#FFB300" stroke-width="1"/>
