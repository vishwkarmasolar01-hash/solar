<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="transparent"/>
  <g opacity="0.04">
    <!-- Small solar panel icon -->
    <rect x="20" y="20" width="40" height="35" rx="2" fill="#1565C0" stroke="#42A5F5" stroke-width="0.5"/>
    <line x1="20" y1="31" x2="60" y2="31" stroke="#64B5F6" stroke-width="0.5"/>
    <line x1="20" y1="42" x2="60" y2="42" stroke="#64B5F6" stroke-width="0.5"/>
    <line x1="33" y1="20" x2="33" y2="55" stroke="#64B5F6" stroke-width="0.5"/>
    <line x1="46" y1="20" x2="46" y2="55" stroke="#64B5F6" stroke-width="0.5"/>

    <!-- Sun -->
